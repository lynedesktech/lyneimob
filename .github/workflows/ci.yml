name: CI

on:
  pull_request:
    branches: [main, desenvolvimento]
  push:
    branches: [main, desenvolvimento]

jobs:
  lint-e-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (informativo — nao bloqueia)
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build de producao
    runs-on: ubuntu-latest
    needs: lint-e-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          # Env vars dummy — o build so compila, nao consulta nada
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          OPENAI_API_KEY: dummy-openai
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
          STRIPE_PRICE_ID_CRM_IA: price_dummy_crm_ia
          STRIPE_PRICE_ID_CRM_IA_SDR: price_dummy_crm_ia_sdr
          UPSTASH_REDIS_REST_URL: https://dummy.upstash.io
          UPSTASH_REDIS_REST_TOKEN: dummy-redis-token
          RESEND_API_KEY: re_dummy
          RESEND_FROM_EMAIL: LyneImob <noreply@example.com>
